<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的简讯 | MyInfo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="three-canvas"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <nav class="nav-dots">
    <button class="nav-dot active" data-section="0" aria-label="首页"></button>
    <button class="nav-dot" data-section="1" aria-label="发布"></button>
    <button class="nav-dot" data-section="2" aria-label="简讯流"></button>
    <button class="nav-dot" data-section="3" aria-label="媒体库"></button>
    <button class="nav-dot" data-section="4" aria-label="设置"></button>
  </nav>

  <main class="site-main">
    <!-- Section 1: Hero -->
    <section class="section hero-section" data-section="0">
      <div class="section-content">
        <h1 class="hero-title">我的简讯</h1>
        <p class="hero-subtitle">下一代沉浸式信息体验</p>
        <button class="cyber-btn hero-start">开始探索</button>
      </div>
      <div class="scroll-hint">
        <span>SCROLL</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12l7 7 7-7"/>
        </svg>
      </div>
    </section>

    <!-- Section 2: Compose -->
    <section class="section compose-section" data-section="1">
      <div class="section-content">
        <h2 class="section-title">发布简讯</h2>
        <p class="section-subtitle">记录此刻的想法、心情与灵感</p>

        <div class="compose-grid">
          <div class="compose-left">
            <div class="cyber-card user-panel">
              <input type="file" id="avatar-input" accept="image/*" hidden>
              <img class="avatar avatar-clickable current-avatar" src="" alt="头像">
              <div>
                <input class="user-name" type="text" value="我" maxlength="20">
                <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">点击头像更换</div>
              </div>
            </div>

            <div class="cyber-card" style="padding: 24px;">
              <div style="font-size: 13px; color: var(--cyan); margin-bottom: 12px; font-family: Orbitron;">选择心情</div>
              <div class="mood-selector">
                <button class="mood-item active" data-mood="" title="无">−</button>
                <button class="mood-item" data-mood="😊" title="开心">😊</button>
                <button class="mood-item" data-mood="😂" title="搞笑">😂</button>
                <button class="mood-item" data-mood="🤔" title="思考">🤔</button>
                <button class="mood-item" data-mood="👍" title="赞">👍</button>
                <button class="mood-item" data-mood="❤️" title="喜欢">❤️</button>
                <button class="mood-item" data-mood="🎉" title="庆祝">🎉</button>
                <button class="mood-item" data-mood="😴" title="疲惫">😴</button>
                <button class="mood-item" data-mood="😭" title="难过">😭</button>
              </div>
            </div>

            <div class="cyber-card" style="padding: 24px;">
              <div style="font-size: 13px; color: var(--cyan); margin-bottom: 12px; font-family: Orbitron;">添加媒体</div>
              <div class="media-tools">
                <button class="tool-btn tool-image" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                  图片
                </button>
                <button class="tool-btn tool-video" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M10 9l5 3-5 3V9z"/></svg>
                  视频
                </button>
              </div>
            </div>
          </div>

          <div class="cyber-card compose-panel">
            <textarea class="cyber-input compose-input" rows="5" placeholder="输入你的想法... #标签 支持自动提取"></textarea>
            <div class="media-preview" hidden></div>
            <div class="compose-actions">
              <span class="compose-count">0/140</span>
              <button class="cyber-btn compose-submit" disabled>发布</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Section 3: Feed -->
    <section class="section feed-section" data-section="2">
      <div class="section-content">
        <h2 class="section-title">简讯流</h2>
        <p class="section-subtitle">浏览、互动与管理你的简讯</p>

        <div class="cyber-card search-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input class="search-input" type="text" placeholder="搜索内容、作者或标签">
        </div>

        <ul class="post-flow"></ul>

        <div class="empty-state" hidden>
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor">
              <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
          </div>
          <p class="empty-title">暂无简讯</p>
          <p class="empty-desc">前往发布区创建第一条简讯</p>
        </div>
      </div>
    </section>

    <!-- Section 4: Library -->
    <section class="section library-section" data-section="3">
      <div class="section-content">
        <h2 class="section-title">媒体库</h2>
        <p class="section-subtitle">全息存储介质管理</p>

        <div class="gallery"></div>

        <div class="empty-state empty-state-library" hidden>
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor">
              <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2z"/>
            </svg>
          </div>
          <p class="empty-title">媒体库为空</p>
          <p class="empty-desc">上传图片或视频后将在此展示</p>
        </div>
      </div>
    </section>

    <!-- Section 5: Settings -->
    <section class="section settings-section" data-section="4">
      <div class="section-content">
        <h2 class="section-title">系统设置</h2>
        <p class="section-subtitle">自定义你的沉浸式体验</p>

        <div class="settings-grid">
          <div class="cyber-card settings-card">
            <h3>主题色调</h3>
            <div class="theme-options">
              <button class="theme-option active" data-theme="cyan" style="background: #00f0ff;" title="霓虹青"></button>
              <button class="theme-option" data-theme="purple" style="background: #b829dd;" title="霓虹紫"></button>
              <button class="theme-option" data-theme="pink" style="background: #ff2a6d;" title="霓虹粉"></button>
              <button class="theme-option" data-theme="green" style="background: #05ffa1;" title="霓虹绿"></button>
            </div>
          </div>

          <div class="cyber-card settings-card">
            <h3>背景切换间隔</h3>
            <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
              <button class="cyber-btn bg-interval" data-interval="5">5s</button>
              <button class="cyber-btn bg-interval active" data-interval="10" style="background: rgba(0, 240, 255, 0.2);">10s</button>
              <button class="cyber-btn bg-interval" data-interval="30">30s</button>
              <button class="cyber-btn bg-interval" data-interval="60">60s</button>
            </div>
          </div>

          <div class="cyber-card settings-card">
            <h3>数据管理</h3>
            <button class="cyber-btn cyber-btn-pink clear-data">清空所有数据</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <input type="file" id="image-input" accept="image/*" multiple hidden>
  <input type="file" id="video-input" accept="video/mp4,video/webm" hidden>

  <div class="toast" hidden></div>

  <script src="lib/three.min.js"></script>
  <script src="lib/gsap.min.js"></script>
  <script src="lib/scrolltrigger.min.js"></script>
  <script src="js/myinfo-db.js"></script>
  <script src="js/myinfo-utils.js"></script>
  <script src="js/myinfo-media.js"></script>
  <script src="js/three-scene.js"></script>
  <script src="js/scroll-controller.js"></script>
  <script src="js/myinfo-app.js"></script>
</body>
</html>
