<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的简讯</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-slider">
    <div class="bg-slide active" data-image="images/backgrounds/mountains.jpg"></div>
    <div class="bg-slide" data-image="images/backgrounds/lake.jpg"></div>
    <div class="bg-slide" data-image="images/backgrounds/forest.jpg"></div>
    <div class="bg-slide" data-image="images/backgrounds/sunset.jpg"></div>
    <div class="bg-slide" data-image="images/backgrounds/ocean.jpg"></div>
    <div class="bg-slide" data-image="images/backgrounds/meadow.jpg"></div>
    <div class="bg-overlay"></div>
  </div>

  <header class="header">
    <div class="header-inner">
      <a href="#" class="logo">我的简讯</a>
      <nav class="nav">
        <button class="nav-item active" data-tab="home">首页</button>
        <button class="nav-item" data-tab="mine">我的</button>
        <button class="nav-item" data-tab="library">媒体库</button>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="tab-panel" data-panel="home">
      <div class="banner">
        <img class="banner-image" src="images/banners/banner1.jpg" alt="Banner">
        <div class="banner-content">
          <h1 class="banner-title">记录每一刻</h1>
          <p class="banner-subtitle">分享心情、想法与生活点滴</p>
        </div>
      </div>

      <div class="user-card card">
        <input type="file" id="avatar-input" accept="image/*" hidden>
        <img class="avatar avatar-clickable current-avatar" src="" alt="点击更换头像" title="点击更换头像">
        <div class="user-info">
          <input class="user-name" type="text" value="我" maxlength="20">
          <p class="user-hint">点击头像可上传自定义头像，点击昵称可直接编辑</p>
        </div>
      </div>

      <div class="compose card">
        <div class="compose-row">
          <img class="avatar current-avatar-small" src="" alt="头像">
          <div class="compose-body">
            <textarea class="compose-input" rows="3" placeholder="分享今日心情、想法或新鲜事..."></textarea>

            <div class="mood-selector">
              <button class="mood-item active" data-mood="" title="无">−</button>
              <button class="mood-item" data-mood="😊" title="开心">😊</button>
              <button class="mood-item" data-mood="😂" title="搞笑">😂</button>
              <button class="mood-item" data-mood="🤔" title="思考">🤔</button>
              <button class="mood-item" data-mood="👍" title="赞">👍</button>
              <button class="mood-item" data-mood="❤️" title="喜欢">❤️</button>
              <button class="mood-item" data-mood="🎉" title="庆祝">🎉</button>
              <button class="mood-item" data-mood="😴" title="疲惫">😴</button>
              <button class="mood-item" data-mood="😭" title="难过">😭</button>
            </div>

            <div class="media-preview" hidden></div>
            <div class="compose-footer">
              <div class="compose-tools">
                <button class="tool-btn tool-image" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                  图片
                </button>
                <button class="tool-btn tool-video" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M10 9l5 3-5 3V9z"/></svg>
                  视频
                </button>
              </div>
              <div class="compose-actions">
                <span class="compose-count">0/140</span>
                <button class="btn btn-primary compose-submit" disabled>发布</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="search card">
        <div class="search-inner">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          <input class="search-input" type="text" placeholder="搜索内容、作者或标签">
        </div>
      </div>

      <ul class="post-list"></ul>

      <div class="empty-state" hidden>
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" width="64" height="64">
            <path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
          </svg>
        </div>
        <p class="empty-title">还没有简讯</p>
        <p class="empty-desc">发布第一条简讯，记录此刻心情</p>
      </div>
    </section>

    <section class="tab-panel" data-panel="mine" hidden>
      <div class="search card">
        <div class="search-inner">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          <input class="search-input-mine" type="text" placeholder="搜索我的简讯">
        </div>
      </div>
      <ul class="post-list-mine"></ul>
      <div class="empty-state empty-state-mine" hidden>
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" width="64" height="64"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <p class="empty-title">你还没有发布过简讯</p>
        <p class="empty-desc">在首页发布一条简讯吧</p>
      </div>
    </section>

    <section class="tab-panel" data-panel="library" hidden>
      <div class="card" style="padding: 22px; margin-bottom: 20px;">
        <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 6px;">媒体库</h2>
        <p style="font-size: 14px; color: var(--text-secondary);">管理本地上传的图片与视频素材</p>
      </div>
      <div class="library"></div>
      <div class="empty-state empty-state-library" hidden>
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" width="64" height="64"><path fill="currentColor" d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        </div>
        <p class="empty-title">暂无媒体文件</p>
        <p class="empty-desc">发布简讯时上传的图片和视频会出现在这里</p>
      </div>
    </section>
  </main>

  <div class="bg-controls">
    <div class="bg-dot active"></div>
    <div class="bg-dot"></div>
    <div class="bg-dot"></div>
    <div class="bg-dot"></div>
    <div class="bg-dot"></div>
    <div class="bg-dot"></div>
    <button class="bg-settings-btn" title="切换背景设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div class="bg-settings" hidden>
    <div class="bg-settings-title">背景切换间隔</div>
    <div class="bg-settings-options">
      <button class="bg-option" data-interval="5">5秒</button>
      <button class="bg-option active" data-interval="10">10秒</button>
      <button class="bg-option" data-interval="30">30秒</button>
      <button class="bg-option" data-interval="60">60秒</button>
    </div>
  </div>

  <input type="file" id="image-input" accept="image/*" multiple hidden>
  <input type="file" id="video-input" accept="video/mp4,video/webm" hidden>

  <div class="toast" hidden></div>

  <script src="js/myinfo-db.js"></script>
  <script src="js/myinfo-utils.js"></script>
  <script src="js/myinfo-media.js"></script>
  <script src="js/myinfo-app.js"></script>
</body>
</html>
